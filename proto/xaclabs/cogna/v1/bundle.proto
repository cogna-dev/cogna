syntax = "proto3";

package xaclabs.cogna.v1;

import "google/protobuf/struct.proto";

enum Profile {
  PROFILE_UNSPECIFIED = 0;
  PROFILE_GO_MODULE = 1;
  PROFILE_RUST_CRATE = 2;
  PROFILE_TERRAFORM_MODULE = 3;
  PROFILE_OPENAPI_SPEC = 4;
}

enum ShapeForm {
  SHAPE_FORM_UNSPECIFIED = 0;
  SHAPE_FORM_SYMBOL = 1;
  SHAPE_FORM_CALLABLE = 2;
}

enum RelationKind {
  RELATION_KIND_UNSPECIFIED = 0;
  RELATION_KIND_DECLARED_IN = 1;
  RELATION_KIND_CONTAINS = 2;
  RELATION_KIND_HAS_MEMBER = 3;
  RELATION_KIND_HAS_PARAMETER = 4;
  RELATION_KIND_RETURNS = 5;
  RELATION_KIND_REFERENCES_TYPE = 6;
  RELATION_KIND_IMPLEMENTS = 7;
  RELATION_KIND_USES_PROVIDER = 8;
  RELATION_KIND_PROVIDED_BY = 9;
}

message ErrorResponse {
  string code = 1;
  string message = 2;
}

message VersionRef {
  string value = 1;
}

message SourceLocation {
  string uri = 1;
  int32 start_line = 2;
  int32 end_line = 3;
}

message Relation {
  RelationKind kind = 1;
  string target = 2;
}

message DeclarationSchema {
  string version = 1;
  string format = 2;
  string model = 3;
  // JSON schema snapshot for declaration validation and downstream tooling.
  google.protobuf.Struct schema = 4;
}

message SourceInfo {
  string repo = 1;
  string ref = 2;
  string commit = 3;
}

message BundleChecksum {
  string path = 1;
  string sha256 = 2;
}

message BuildMetadata {
  string status = 1;
  string note = 2;
}

message ExtractorTiming {
  int32 initialize_ms = 1;
  int32 extract_ms = 2;
  int32 normalize_ms = 3;
  int32 total_ms = 4;
}

message ExtractorStats {
  int32 declarations = 1;
  int32 symbols = 2;
  int32 diagnostic_files = 3;
}

message ExtractorMetadata {
  string role = 1;
  string backend = 2;
  string mode = 3;
  string server = 4;
  string version = 5;
  bool fallback = 6;
  ExtractorTiming timing_ms = 7;
  ExtractorStats stats = 8;
}

message BundleMetadata {
  // Metadata schema version, currently aligned with ciq-metadata/v1.
  string schema_version = 1;
  Profile profile = 2;
  repeated string input_patterns = 3;
  BuildMetadata build = 4;
  ExtractorMetadata extractor = 5;
}

message DeclarationShape {
  string kind = 1;
  string subkind = 2;
  ShapeForm form = 3;
  string signature = 4;
  string owner = 5;
  repeated string type_params = 6;
  repeated string parameters = 7;
  repeated string returns = 8;
}

message TerraformProvider {
  string name = 1;
  string source = 2;
  string version = 3;
  string alias = 4;
}

message ProviderInventory {
  repeated TerraformProvider terraform = 1;
}

message GoSpecific {
  string receiver = 1;
  bool pointer_receiver = 2;
  bool embedded = 3;
  string owner = 4;
  string field_type = 5;
  string import_path = 6;
  string import_alias = 7;
  repeated string type_params = 8;
  repeated string method_set_types = 9;
}

message RustSpecific {
  string owner = 1;
  repeated string type_params = 2;
  string where_clause = 3;
  string trait_target = 4;
  string impl_target = 5;
  bool associated = 6;
  bool unsafe = 7;
  string extern_abi = 8;
}

message TerraformSpecific {
  bool required = 1;
  bool sensitive = 2;
  string module_source = 3;
  string provider_ref = 4;
  repeated string depends_on = 5;
  bool prevent_destroy = 6;
  bool create_before_destroy = 7;
  repeated string ignore_changes = 8;
}

message OpenApiSpecific {
  string http_method = 1;
  string operation_id = 2;
  string parameter_in = 3;
  bool required = 4;
  repeated string media_types = 5;
  repeated string status_codes = 6;
  string ref = 7;
  string callback_expression = 8;
  string discriminator_property = 9;
  map<string, string> discriminator_mapping = 10;
  repeated string member_refs = 11;
  string security_scheme_type = 12;
  string security_scheme_in = 13;
  string security_scheme_name = 14;
}

message LanguageSpecific {
  Profile profile = 1;
  string server = 2;
  ProviderInventory providers = 3;
  GoSpecific go = 4;
  RustSpecific rust = 5;
  TerraformSpecific terraform = 6;
  OpenApiSpecific openapi = 7;
}

message Declaration {
  string id = 1;
  string kind = 2;
  string name = 3;
  string canonical_name = 4;
  string path = 5;
  string signature = 6;
  DeclarationShape shape = 7;
  string visibility = 8;
  string docs = 9;
  // Baseline role string carried by the current JSON schema.
  string baseline_role = 10;
  string language = 11;
  // Source spans that contributed to the declaration.
  repeated SourceLocation source_refs = 12;
  // Stable structural and semantic relations originating from the declaration.
  repeated Relation relations = 13;
  SourceLocation location = 14;
  // Ecosystem-specific payload that preserves information not flattened into the shared core.
  LanguageSpecific language_specific = 15;
  // Whether the declaration is deprecated in the extracted view.
  bool deprecated = 16;
}

message Symbol {
  string id = 1;
  string path = 2;
  string kind = 3;
  string name = 4;
  string summary = 5;
  string owner = 6;
  SourceLocation location = 7;
}

message ComponentHash {
  string alg = 1;
  string content = 2;
}

message SoftwareComponent {
  string id = 1;
  string name = 2;
  string version = 3;
  string purl = 4;
  string component_type = 5;
  string scope = 6;
  // Evidence path used to attribute the component to source material.
  string evidence_path = 7;
  repeated ComponentHash hashes = 8;
  SourceLocation location = 9;
}

message Bundle {
  // Bundle schema version, aligned with the current ciq-bundle/v1 JSON manifest.
  string schema_version = 1;
  string purl = 2;
  Profile profile = 3;
  // Declaration schema descriptor used by declaration records in this bundle.
  DeclarationSchema declaration_schema = 4;
  SourceInfo source = 5;
  // Structured metadata that mirrors metadata.json.
  BundleMetadata metadata = 6;
  // SHA-256 digests for the logical serialized sections of this bundle.
  repeated BundleChecksum checksums = 7;
  repeated Declaration declarations = 8;
  repeated Symbol symbols = 9;
  repeated SoftwareComponent software_components = 10;
  // Raw SPDX JSON text exported from the bundle.
  string sbom_spdx_json = 11;
}
