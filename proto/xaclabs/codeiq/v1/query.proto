syntax = "proto3";

package xaclabs.codeiq.v1;

import "google/protobuf/struct.proto";
import "xaclabs/codeiq/v1/bundle.proto";

enum BuiltinTable {
  BUILTIN_TABLE_UNSPECIFIED = 0;
  BUILTIN_TABLE_BUNDLE_MANIFEST = 1;
  BUILTIN_TABLE_BUNDLE_CHECKSUMS = 2;
  BUILTIN_TABLE_DECLARATIONS = 3;
  BUILTIN_TABLE_DECLARATION_SOURCE_REFS = 4;
  BUILTIN_TABLE_DECLARATION_RELATIONS = 5;
  BUILTIN_TABLE_SYMBOLS = 6;
  BUILTIN_TABLE_SOFTWARE_COMPONENTS = 7;
  BUILTIN_TABLE_COMPONENT_HASHES = 8;
  BUILTIN_TABLE_CODEIQ_TABLES = 9;
  BUILTIN_TABLE_CODEIQ_COLUMNS = 10;
}

enum ColumnType {
  COLUMN_TYPE_UNSPECIFIED = 0;
  COLUMN_TYPE_STRING = 1;
  COLUMN_TYPE_BOOL = 2;
  COLUMN_TYPE_INT64 = 3;
  COLUMN_TYPE_DOUBLE = 4;
  COLUMN_TYPE_BYTES = 5;
  COLUMN_TYPE_JSON = 6;
}

message QueryTarget {
  string purl = 1;
  string bundle_id = 2;
  string bundle_path = 3;
}

message QueryOptions {
  int32 limit = 1;
  string cursor = 2;
  bool include_catalog = 3;
}

message ColumnSchema {
  string name = 1;
  ColumnType type = 2;
  bool nullable = 3;
  string description = 4;
  string source_field = 5;
}

message TableSchema {
  BuiltinTable table = 1;
  string name = 2;
  string description = 3;

  repeated ColumnSchema columns = 4;
  repeated string primary_key = 5;
}

message QueryCatalog {
  string schema_version = 1;
  string purl = 2;
  repeated TableSchema tables = 3;
}

message QueryValue {
  oneof kind {
    google.protobuf.NullValue null_value = 1;
    bool bool_value = 2;
    int64 int64_value = 3;
    double double_value = 4;
    string string_value = 5;
    bytes bytes_value = 6;
    google.protobuf.Struct json_value = 7;
  }
}

message QueryRow {
  repeated QueryValue values = 1;
}

message QueryResultSet {
  repeated ColumnSchema columns = 1;
  repeated QueryRow rows = 2;
  string cursor = 3;
  int64 row_count = 4;
  bool truncated = 5;
}

message QueryExecution {
  string dialect = 1;
  string normalized_sql = 2;
  string bundle_purl = 3;
}

message QueryInput {
  QueryTarget target = 1;
  string sql = 2;
  QueryOptions options = 3;
}

message QueryOutput {
  bool success = 1;
  QueryResultSet result_set = 2;
  QueryCatalog catalog = 3;
  QueryExecution execution = 4;
  ErrorResponse error = 10;
}
