syntax = "proto3";

package xaclabs.codeiq.v1;

import "xaclabs/codeiq/v1/build.proto";
import "xaclabs/codeiq/v1/diff.proto";
import "xaclabs/codeiq/v1/query.proto";

service CodeIqApiService {
  // Build creates or refreshes the unique bundle for the package at the input path.
  rpc Build(BuildInput) returns (BuildOutput);

  // Diff compares two versions of the package at the input path.
  rpc Diff(DiffInput) returns (DiffOutput);

  rpc Query(QueryInput) returns (QueryOutput);
}
