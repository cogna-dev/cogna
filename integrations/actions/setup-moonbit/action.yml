name: 'Setup MoonBit'
description: 'Install the MoonBit programming language toolchain (moon, moonc, moonrun)'
author: 'yufeiminds'

inputs:
  version:
    description: 'MoonBit version to install (currently unused, installs latest)'
    required: false
    default: 'latest'

outputs:
  moon-version:
    description: 'The installed moon version'
    value: ${{ steps.version.outputs.moon-version }}
  moonc-version:
    description: 'The installed moonc version'
    value: ${{ steps.version.outputs.moonc-version }}

runs:
  using: 'composite'
  steps:
    - name: Install MoonBit (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
        echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

    - name: Install MoonBit (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
        irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
        "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

    - name: Update MoonBit packages
      shell: bash
      run: |
        export PATH="$HOME/.moon/bin:$PATH"
        moon update

    - name: Verify installation
      id: version
      shell: bash
      run: |
        export PATH="$HOME/.moon/bin:$PATH"
        moon version --all
        echo "moon-version=$(moon version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"
        echo "moonc-version=$(moonc -v 2>&1 | head -1)" >> "$GITHUB_OUTPUT"

branding:
  icon: 'moon'
  color: 'purple'
