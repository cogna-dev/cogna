name: 'Run CodeIQ'
description: 'Run a CodeIQ command and optionally upload SARIF when checking compatibility'
author: 'yufeiminds'

inputs:
  working-directory:
    description: 'Repository directory where the CodeIQ command should run.'
    required: false
    default: '.'
  command:
    description: 'CodeIQ subcommand to execute.'
    required: true
  args:
    description: 'Additional arguments appended verbatim after the subcommand.'
    required: false
    default: ''
  upload-sarif:
    description: 'When command is check, upload the SARIF file to GitHub Code Scanning.'
    required: false
    default: 'false'
  sarif-file:
    description: 'Path to the SARIF file, relative to working-directory unless absolute.'
    required: false
    default: 'dist/check.sarif.json'
  sarif-category:
    description: 'GitHub Code Scanning SARIF category.'
    required: false
    default: 'codeiq'

outputs:
  sarif-file:
    description: 'Resolved SARIF file path used for upload/output.'
    value: ${{ steps.run.outputs.sarif-file }}

runs:
  using: 'composite'
  steps:
    - name: Run CodeIQ command
      id: run
      shell: bash
      run: |
        set -euo pipefail
        working_dir="${{ inputs.working-directory }}"
        command_name="${{ inputs.command }}"
        extra_args="${{ inputs.args }}"
        sarif_input="${{ inputs.sarif-file }}"

        resolved_sarif="$sarif_input"
        if [[ ! "$sarif_input" =~ ^/ && ! "$sarif_input" =~ ^[A-Za-z]:\\ ]]; then
          if [ "$working_dir" = "." ]; then
            resolved_sarif="$sarif_input"
          else
            resolved_sarif="$working_dir/$sarif_input"
          fi
        fi

        cd "$working_dir"
        command_line="codeiq \"$command_name\""
        if [ -n "$extra_args" ]; then
          command_line="$command_line $extra_args"
        fi

        set +e
        bash -lc "$command_line"
        exit_code=$?
        set -e

        echo "exit-code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "sarif-file=$resolved_sarif" >> "$GITHUB_OUTPUT"

    - name: Validate SARIF output
      if: ${{ inputs.command == 'check' && inputs.upload-sarif == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        sarif_file="${{ steps.run.outputs.sarif-file }}"
        if [ ! -f "$sarif_file" ]; then
          echo "Expected SARIF file at $sarif_file before upload" >&2
          exit 1
        fi

    - name: Prepare SARIF upload payload
      if: ${{ inputs.command == 'check' && inputs.upload-sarif == 'true' }}
      id: upload-payload
      shell: bash
      run: |
        set -euo pipefail
        sarif_file="${{ steps.run.outputs.sarif-file }}"
        payload_file="$RUNNER_TEMP/codeiq-sarif-upload.json"
        python3 - "$sarif_file" "$payload_file" "${{ inputs.sarif-category }}" <<'PY'
        import base64
        import datetime
        import gzip
        import json
        import os
        import pathlib
        import sys

        sarif_path = pathlib.Path(sys.argv[1])
        payload_path = pathlib.Path(sys.argv[2])
        category = sys.argv[3].strip()

        report = json.loads(sarif_path.read_text(encoding="utf-8"))
        if category:
            for run in report.get("runs", []):
                automation = run.setdefault("automationDetails", {})
                automation["id"] = category
            sarif_path.write_text(json.dumps(report, indent=2), encoding="utf-8")

        encoded = base64.b64encode(gzip.compress(sarif_path.read_bytes())).decode("ascii")
        workspace = os.environ.get("GITHUB_WORKSPACE", os.getcwd()).rstrip("/") + "/"
        payload = {
            "checkout_uri": f"file://{workspace}",
            "commit_sha": os.environ.get("GITHUB_SHA", ""),
            "ref": os.environ.get("GITHUB_REF", ""),
            "sarif": encoded,
            "started_at": datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
            "tool_name": "codeiq",
            "validate": True,
        }
        payload_path.write_text(json.dumps(payload), encoding="utf-8")
        PY
        echo "payload-file=$payload_file" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF to GitHub Code Scanning REST API
      if: ${{ inputs.command == 'check' && inputs.upload-sarif == 'true' && env.ACT != 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${GITHUB_TOKEN:-}" ]; then
          echo "GITHUB_TOKEN is required for SARIF upload" >&2
          exit 1
        fi
        if [ -z "${GITHUB_REPOSITORY:-}" ]; then
          echo "GITHUB_REPOSITORY is required for SARIF upload" >&2
          exit 1
        fi
        payload_file="${{ steps.upload-payload.outputs.payload-file }}"
        api_url="${GITHUB_API_URL:-https://api.github.com}"
        response_file="$RUNNER_TEMP/codeiq-sarif-upload-response.json"
        status_code=$(curl -sS -o "$response_file" -w "%{http_code}" \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          "$api_url/repos/${GITHUB_REPOSITORY}/code-scanning/sarifs" \
          --data-binary @"$payload_file")
        if [ "$status_code" != "202" ]; then
          echo "SARIF upload failed with status $status_code" >&2
          cat "$response_file" >&2
          exit 1
        fi

    - name: Capture SARIF upload request under act
      if: ${{ inputs.command == 'check' && inputs.upload-sarif == 'true' && env.ACT == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        payload_file="${{ steps.upload-payload.outputs.payload-file }}"
        capture_file="${CODEIQ_SARIF_UPLOAD_CAPTURE:-${{ steps.run.outputs.sarif-file }}.upload.json}"
        cp "$payload_file" "$capture_file"
        echo "act detected; captured SARIF upload request at $capture_file"

    - name: Fail when CodeIQ command fails
      if: ${{ steps.run.outputs.exit-code != '0' }}
      shell: bash
      run: |
        exit "${{ steps.run.outputs.exit-code }}"

branding:
  icon: 'shield'
  color: 'purple'
