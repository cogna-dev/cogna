<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>

  <!-- Code Window -->
  <rect x="40" y="50" width="140" height="180" rx="8" fill="#1e293b"/>
  <rect x="40" y="50" width="140" height="24" rx="8" fill="#334155"/>
  <circle cx="56" cy="62" r="4" fill="#ef4444"/>
  <circle cx="68" cy="62" r="4" fill="#f59e0b"/>
  <circle cx="80" cy="62" r="4" fill="#22c55e"/>

  <!-- Code Lines -->
  <rect x="52" y="90" width="80" height="6" rx="2" fill="#64748b"/>
  <rect x="52" y="106" width="60" height="6" rx="2" fill="#64748b"/>
  <rect x="52" y="122" width="100" height="6" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="52" y="138" width="70" height="6" rx="2" fill="#64748b"/>
  <rect x="52" y="154" width="90" height="6" rx="2" fill="#64748b"/>

  <!-- AI/Brain Icon -->
  <circle cx="280" cy="120" r="50" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <path d="M260 115c0-5.5 4.5-10 10-10s10 4.5 10 10-4.5 10-10 10-10-4.5-10-10z" fill="#6366f1"/>
  <path d="M290 115c0-5.5 4.5-10 10-10s10 4.5 10 10-4.5 10-10 10-10-4.5-10-10z" fill="#6366f1"/>
  <path d="M275 135c5 5 15 5 20 0" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Connection Lines -->
  <path d="M180 120 L220 120" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5,5"/>
  <circle cx="200" cy="120" r="4" fill="#3b82f6"/>

  <!-- Output/Context Bubble -->
  <rect x="220" y="190" width="120" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <rect x="230" y="205" width="80" height="6" rx="2" fill="#64748b"/>
  <rect x="230" y="218" width="60" height="6" rx="2" fill="#64748b"/>
  <rect x="230" y="231" width="90" height="6" rx="2" fill="#3b82f6" opacity="0.6"/>

  <!-- Arrow Down -->
  <path d="M280 170 L280 185" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <path d="M275 180 L280 185 L285 180" stroke="#94a3b8" stroke-width="2" fill="none"/>
