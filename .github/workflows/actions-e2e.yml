name: Actions E2E

on:
  workflow_dispatch:

jobs:
  setup-cogna-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: ./integrations/actions/setup-moonbit

      - name: Setup Cogna
        id: setup
        uses: ./integrations/actions/setup-cogna

      - name: Assert setup outputs and smoke init
        shell: bash
        run: |
          set -euo pipefail
          test -x "${{ steps.setup.outputs.cogna-path }}"
          test -n "${{ steps.setup.outputs.cogna-version }}"
          cogna init --output /tmp/cogna-actions-smoke.yml
          test -f /tmp/cogna-actions-smoke.yml

  run-cogna-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: ./integrations/actions/setup-moonbit

      - name: Setup Cogna
        uses: ./integrations/actions/setup-cogna

      - name: Prepare fixture repositories
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/cogna-actions-e2e"
          sdk="$root/sdk"
          policy="$root/policy"
          mkdir -p "$sdk/openapi" "$policy/rego"
          cp examples/openapi-spec/full/repo/openapi/payment.yaml "$sdk/openapi/payment.yaml"
          cat > "$sdk/cogna.yml" <<'EOF'
          schemaVersion: ciq-config/v2
          profile: openapi-spec
          purl: pkg:openapi/acme/payment-api@2026.03.01
          source:
            repo: https://github.com/acme/payment-api
            ref: main
          inputs:
            include:
              - openapi/**/*.yaml
          checks:
            format: sarif
            policy: ../policy/dist/bundle.ciq.tgz
          diff:
            includeTestChanges: false
          sbom:
            format: spdx
            dependencyBundles: true
            requireLocalPackages: true
          publish:
            includeDependencies: true
          registry:
            port: 8787
            storeDir: .cogna/cache/registry
          mcp:
            port: 3000
          EOF
          cat > "$policy/cogna.yml" <<'EOF'
          schemaVersion: ciq-config/v2
          profile: policy-bundle
          purl: pkg:generic/acme/compat-policy@2026.03.01
          source:
            repo: https://github.com/acme/compat-policy
            ref: main
          inputs:
            include:
              - rego/**/*.rego
          checks:
            format: sarif
            policy: ./dist/policy.ciq.tgz
          diff:
            includeTestChanges: false
          sbom:
            format: spdx
            dependencyBundles: true
            requireLocalPackages: true
          publish:
            includeDependencies: true
          registry:
            port: 8787
            storeDir: .cogna/cache/registry
          mcp:
            port: 3000
          EOF

      - name: Build policy bundle
        uses: ./integrations/actions/run-cogna
        with:
          working-directory: ${{ runner.temp }}/cogna-actions-e2e/policy
          command: build
          upload-sarif: false

      - name: Build SDK bundle
        uses: ./integrations/actions/run-cogna
        with:
          working-directory: ${{ runner.temp }}/cogna-actions-e2e/sdk
          command: build
          upload-sarif: false

      - name: Prepare diff inputs
        shell: bash
        run: |
          set -euo pipefail
          sdk="$RUNNER_TEMP/cogna-actions-e2e/sdk"
          mkdir -p "$sdk/dist/base" "$sdk/dist/target"
          cp "$sdk/dist/manifest.json" "$sdk/dist/base/manifest.json"
          cp "$sdk/dist/declarations.ndjson" "$sdk/dist/base/declarations.ndjson"
          cp "$sdk/dist/symbols.ndjson" "$sdk/dist/base/symbols.ndjson"
          cp "$sdk/dist/declarations.ndjson" "$sdk/dist/target/declarations.ndjson"
          cp "$sdk/dist/symbols.ndjson" "$sdk/dist/target/symbols.ndjson"
          python3 - <<'PY'
          import json
          import os
          sdk = os.path.join(os.environ['RUNNER_TEMP'], 'cogna-actions-e2e', 'sdk')
          with open(os.path.join(sdk, 'dist', 'manifest.json'), 'r', encoding='utf-8') as handle:
              manifest = json.load(handle)
          with open(os.path.join(sdk, 'dist', 'target', 'manifest.json'), 'w', encoding='utf-8') as handle:
              manifest['purl'] = 'pkg:openapi/acme/payment-api@2026.04.01'
              json.dump(manifest, handle, indent=2)
          PY

      - name: Run diff
        uses: ./integrations/actions/run-cogna
        with:
          working-directory: ${{ runner.temp }}/cogna-actions-e2e/sdk
          command: diff
          upload-sarif: false

      - name: Run check with SARIF upload branch
        id: check
        env:
          COGNA_OPA_EVAL_JSON: '{"result":[{"expressions":[{"value":[{"rule_id":"compat.core.removed-declaration","level":"error","message":"Public API removal blocked by policy","path":"openapi/payment.yaml","docs":"https://cogna.xaclabs.dev/docs/policies/generated/core/removed-declaration"}]}]}]}'
          COGNA_SARIF_UPLOAD_CAPTURE: ${{ runner.temp }}/cogna-actions-e2e/sdk/dist/check.upload.json
        uses: ./integrations/actions/run-cogna
        with:
          working-directory: ${{ runner.temp }}/cogna-actions-e2e/sdk
          command: check
          upload-sarif: true

      - name: Assert SARIF output
        shell: bash
        run: |
          set -euo pipefail
          sarif_file="${{ steps.check.outputs.sarif-file }}"
          test -f "$sarif_file"
          test -f "$RUNNER_TEMP/cogna-actions-e2e/sdk/dist/check.upload.json"
          grep -q 'compat.core.removed-declaration' "$sarif_file"
          grep -q 'https://cogna.xaclabs.dev/docs/policies/generated/core/removed-declaration' "$sarif_file"
          grep -q 'refs/' "$RUNNER_TEMP/cogna-actions-e2e/sdk/dist/check.upload.json"
          grep -q '"commit_sha"' "$RUNNER_TEMP/cogna-actions-e2e/sdk/dist/check.upload.json"
