name: Release

# Triggers on semver tags (v0.1.0, v1.2.3, etc.) or manual dispatch.
# Produces:
#   - GitHub Release with per-platform CLI archives as download assets
#   - SDK published to mooncakes.io via cogna-dev/moonbit-actions/publish@v0
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0) — must already exist in the repo'
        required: true

# ---------------------------------------------------------------------------
# Shared helpers
# ---------------------------------------------------------------------------
env:
  # Resolved in every job via the tag that triggered the workflow.
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  # -------------------------------------------------------------------------
  # 1. Pre-release checks — must pass before any artifact is built or published
  # -------------------------------------------------------------------------
  pre-release-check:
    name: Pre-release checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup MoonBit
        uses: ./integrations/actions/setup-moonbit

      - name: Lint (moon check)
        run: moon check

      - name: Unit tests
        run: moon test

      - name: Verify tag matches moon.mod.json version
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version=$(python3 -c 'import json; print(json.load(open("moon.mod.json"))["version"])')
          expected="v${version}"
          if [ "$tag" != "$expected" ]; then
            echo "::error::Tag mismatch: git tag='$tag' but moon.mod.json version='$version' (expected '$expected')"
            exit 1
          fi
          echo "Version check passed: $tag == v$version"

      - name: Dry-run SDK publish
        run: moon publish --dry-run

  # -------------------------------------------------------------------------
  # 2. Build CLI — matrix across all supported platforms
  #
  # Archive naming convention: cogna-{tag}-{arch}-{os}.{ext}
  #   Unix:    cogna-v0.1.0-x86_64-linux.tar.gz
  #   Windows: cogna-v0.1.0-x86_64-windows.zip
  # -------------------------------------------------------------------------
  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: pre-release-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            archive-ext: tar.gz
          - target: aarch64-linux
            os: ubuntu-24.04-arm
            archive-ext: tar.gz
          - target: x86_64-macos
            os: macos-13
            archive-ext: tar.gz
          - target: aarch64-macos
            os: macos-latest
            archive-ext: tar.gz
          - target: x86_64-windows
            os: windows-latest
            archive-ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup MoonBit
        uses: ./integrations/actions/setup-moonbit

      - name: Build CLI
        run: moon build

      - name: Install binary to staging dir (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          staging="${RUNNER_TEMP}/cogna-staging"
          mkdir -p "$staging"
          bash integrations/cli/install.sh "$staging" cogna
          echo "STAGING_DIR=$staging" >> "$GITHUB_ENV"

      - name: Install binary to staging dir (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP "cogna-staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          & pwsh -File "integrations/cli/install.ps1" -InstallDir "$staging" -BinaryName "cogna"
          "STAGING_DIR=$staging" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Pack archive (Unix — tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive_name="cogna-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          tar -C "$STAGING_DIR" -czf "${RUNNER_TEMP}/${archive_name}" cogna
          echo "ARCHIVE_PATH=${RUNNER_TEMP}/${archive_name}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=${archive_name}" >> "$GITHUB_ENV"

      - name: Pack archive (Windows — zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "cogna-${env:RELEASE_TAG}-${{ matrix.target }}.zip"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          Compress-Archive -Path (Join-Path $env:STAGING_DIR "cogna.exe") -DestinationPath $archivePath
          "ARCHIVE_PATH=$archivePath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------------
  # 3. Publish GitHub Release — attach all platform archives as assets
  # -------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    needs: build-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all CLI archives
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: dist/
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Cogna ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          generate_release_notes: true
          files: dist/*

  # -------------------------------------------------------------------------
  # 4. Publish SDK to mooncakes.io
  # -------------------------------------------------------------------------
  publish-sdk:
    name: Publish SDK to mooncakes.io
    needs: pre-release-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup MoonBit
        uses: ./integrations/actions/setup-moonbit

      - name: Publish SDK
        uses: cogna-dev/moonbit-actions/publish@v0
        with:
          token: ${{ secrets.MOONCAKES_TOKEN }}
