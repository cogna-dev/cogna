name: Release

# Triggers on semver tags (v0.1.0, v1.2.3, etc.) or manual dispatch.
# Produces:
#   - GitHub Release with per-platform CLI archives as download assets
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0) — must already exist in the repo'
        required: true

# ---------------------------------------------------------------------------
# Shared helpers
# ---------------------------------------------------------------------------
env:
  # Resolved in every job via the tag that triggered the workflow.
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  RELEASE_REF: refs/tags/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  # -------------------------------------------------------------------------
  # 1. Pre-release checks — must pass before any artifact is built or published
  # -------------------------------------------------------------------------
  pre-release-check:
    name: Pre-release checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Verify release ref is an existing tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git rev-parse --verify "${RELEASE_REF}^{tag}" >/dev/null 2>&1 || git rev-parse --verify "${RELEASE_REF}^{commit}" >/dev/null 2>&1 || {
            echo "::error::Release ref '${RELEASE_REF}' is not an existing tag"
            exit 1
          }

      - name: Setup MoonBit
        uses: cogna-dev/moonbit-actions/setup@v0

      - name: Lint (moon check)
        run: moon check

      - name: Unit tests
        run: moon test

      - name: Verify tag matches moon.mod.json version
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version=$(python3 -c 'import json; print(json.load(open("moon.mod.json"))["version"])')
          expected="v${version}"
          if [ "$tag" != "$expected" ]; then
            echo "::error::Tag mismatch: git tag='$tag' but moon.mod.json version='$version' (expected '$expected')"
            exit 1
          fi
          echo "Version check passed: $tag == v$version"

      - name: Dry-run SDK publish
        run: moon publish --dry-run

  # -------------------------------------------------------------------------
  # 2. Build CLI — matrix across all supported platforms
  #
  # Archive naming convention: cogna-{tag}-{arch}-{os}.{ext}
  #   Unix:    cogna-v0.1.0-x86_64-linux.tar.gz
  #   Windows: cogna-v0.1.0-x86_64-windows.zip
  # -------------------------------------------------------------------------
  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: pre-release-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            archive-ext: tar.gz
          - target: aarch64-linux
            os: ubuntu-24.04-arm
            archive-ext: tar.gz
          - target: x86_64-macos
            os: macos-13
            archive-ext: tar.gz
          - target: aarch64-macos
            os: macos-latest
            archive-ext: tar.gz
          - target: x86_64-windows
            os: windows-latest
            archive-ext: zip

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup MoonBit
        uses: cogna-dev/moonbit-actions/setup@v0

      - name: Build CLI
        run: moon build

      - name: Install binary to staging dir (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          staging="${RUNNER_TEMP}/cogna-staging"
          mkdir -p "$staging"
          bash integrations/cli/install.sh "$staging" cogna
          echo "STAGING_DIR=$staging" >> "$GITHUB_ENV"

      - name: Install binary to staging dir (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP "cogna-staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          & pwsh -File "integrations/cli/install.ps1" -InstallDir "$staging" -BinaryName "cogna"
          "STAGING_DIR=$staging" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Pack archive (Unix — tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive_name="cogna-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          tar -C "$STAGING_DIR" -czf "${RUNNER_TEMP}/${archive_name}" cogna
          echo "ARCHIVE_PATH=${RUNNER_TEMP}/${archive_name}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=${archive_name}" >> "$GITHUB_ENV"

      - name: Pack archive (Windows — zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "cogna-${env:RELEASE_TAG}-${{ matrix.target }}.zip"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          Compress-Archive -Path (Join-Path $env:STAGING_DIR "cogna.exe") -DestinationPath $archivePath
          "ARCHIVE_PATH=$archivePath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload archive artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.ARCHIVE_PATH }}
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------------
  # 3. Build Electron desktop installers — per-OS/per-arch matrix
  #
  # Notes:
  #   - macOS installers must be built on macOS runners.
  #   - We currently build Linux x64 only; Linux arm64 would require a
  #     dedicated arm64/self-hosted runner for reliable packaging.
  #   - We currently skip macOS notarization/signing in CI because the desktop
  #     config has notarize=false and no Apple secrets are wired here.
  # -------------------------------------------------------------------------
  build-desktop:
    name: Build desktop (${{ matrix.id }})
    needs: pre-release-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: win-x64
            os: windows-latest
            script: dist:win:x64
            artifact-glob: integrations/desktop/dist/*x64-setup.exe
          - id: win-arm64
            os: windows-latest
            script: dist:win:arm64
            artifact-glob: integrations/desktop/dist/*arm64-setup.exe
          - id: mac-x64
            os: macos-13
            script: dist:mac:x64
            artifact-glob: integrations/desktop/dist/*x64.dmg
          - id: mac-arm64
            os: macos-latest
            script: dist:mac:arm64
            artifact-glob: integrations/desktop/dist/*arm64.dmg
          - id: linux-x64
            os: ubuntu-latest
            script: dist:linux:x64
            artifact-glob: |
              integrations/desktop/dist/*.AppImage
              integrations/desktop/dist/*.deb

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: '10'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync desktop version to release tag
        shell: bash
        env:
          DESKTOP_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          export DESKTOP_VERSION="${DESKTOP_VERSION#v}"
          python3 - <<'PY'
          import os
          import json
          from pathlib import Path
          path = Path('integrations/desktop/package.json')
          data = json.loads(path.read_text())
          data['version'] = os.environ['DESKTOP_VERSION']
          path.write_text(json.dumps(data, indent=2) + '\n')
          PY

      - name: Build desktop installer
        run: pnpm --dir integrations/desktop run ${{ matrix.script }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: desktop-${{ matrix.id }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------------
  # 4. Publish GitHub Release — attach CLI + desktop assets
  # -------------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    needs:
      - build-cli
      - build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Download all CLI archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: cli-*
          path: dist/
          merge-multiple: true

      - name: Download all desktop installers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: desktop-*
          path: dist/
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          generate_release_notes: true
          files: dist/*

