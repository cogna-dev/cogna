name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: ./integrations/actions/setup-moonbit

      - name: Setup CodeIQ
        uses: ./integrations/actions/setup-codeiq

      - name: Check
        run: moon check

      - name: Test
        run: moon test

      - name: Build
        run: moon build

      - name: Smoke test run-codeiq action
        uses: ./integrations/actions/run-codeiq
        with:
          command: init
          args: --output /tmp/codeiq-ci-smoke.yml
