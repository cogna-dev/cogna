name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: cogna-dev/moonbit-actions/setup@v0

      - name: Setup Cogna
        uses: ./integrations/actions/setup-cogna

      - name: Check
        run: moon check --target native

      - name: Test
        run: moon test --target native

      - name: Build
        run: moon build --target native

      - name: Smoke test run-cogna action
        uses: ./integrations/actions/run-cogna
        with:
          command: init
          args: --output /tmp/cogna-ci-smoke.yml

  pre-release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: cogna-dev/moonbit-actions/setup@v0

      - name: Verify moon.mod.json version is well-formed semver
        shell: bash
        run: |
          set -euo pipefail
          version=$(python3 -c 'import json; print(json.load(open("moon.mod.json"))["version"])')
          if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::moon.mod.json version '$version' is not valid semver (X.Y.Z)"
            exit 1
          fi
          echo "Version format OK: $version"

      - name: Dry-run SDK publish
        if: ${{ !env.ACT }}
        run: moon publish --dry-run

  sdk-check:
    name: JS SDK checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@10 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --filter @cogna-dev/sdk install

      - name: Typecheck
        run: pnpm --filter @cogna-dev/sdk run typecheck

      - name: Lint
        run: pnpm --filter @cogna-dev/sdk run lint

      - name: Test
        run: pnpm --filter @cogna-dev/sdk run test

  cli-e2e-repos:
    name: CLI e2e repos checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: cogna-dev/moonbit-actions/setup@v0

      - name: Setup Cogna
        uses: ./integrations/actions/setup-cogna

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'

      - name: Setup Rust
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            source "$HOME/.cargo/env"
          fi
          if [ -f "$HOME/.cargo/env" ]; then
            source "$HOME/.cargo/env"
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup toolchain install stable --profile minimal
          rustup default stable
          cargo --version

      - name: Setup OPA
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v opa >/dev/null 2>&1; then
            curl -L -o /usr/local/bin/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
            chmod +x /usr/local/bin/opa
          fi
          opa version

      - name: Run CLI e2e across repos
        shell: bash
        env:
          COGNA_E2E_TIMEOUT_SECONDS: '30'
        run: |
          set -euo pipefail
          bash scripts/ci/run-cli-e2e.sh
