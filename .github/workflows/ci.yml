name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: ./action

      - name: Check
        run: moon check

      - name: Test
        run: moon test

      - name: Build
        run: moon build

      - name: Run
        run: moon run src/cmd/main
