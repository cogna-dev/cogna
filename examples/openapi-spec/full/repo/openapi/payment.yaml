openapi: 3.1.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
info:
  title: Payment API
  version: 1.0.0
servers:
  - url: https://api.example.com
security:
  - ApiKeyAuth: []
paths:
  /payments:
    parameters:
      - $ref: '#/components/parameters/RequestId'
    get:
      operationId: listPayments
      security:
        - OAuth2: [payments:read]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentList'
    post:
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPayment'
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
      callbacks:
        paymentUpdated:
          '{$request.body#/callbackUrl}':
            post:
              operationId: paymentUpdated
              requestBody:
                required: true
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/Payment'
              responses:
                "200":
                  description: callback received
  /payments/{paymentId}:
    parameters:
      - name: paymentId
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getPayment
      responses:
        "200":
          description: single payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        "404":
          $ref: '#/components/responses/NotFound'

webhooks:
  paymentEvent:
    post:
      operationId: paymentEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Payment'
      responses:
        "200":
          description: received

components:
  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
  requestBodies:
    PaymentRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NewPayment'
  responses:
    NotFound:
      description: not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    PaymentBase:
      type: object
      properties:
        id:
          type: string
        amount:
          type: number
    CardPayment:
      allOf:
        - $ref: '#/components/schemas/PaymentBase'
        - type: object
          properties:
            cardLast4:
              type: string
    BankPayment:
      allOf:
        - $ref: '#/components/schemas/PaymentBase'
        - type: object
          properties:
            iban:
              type: string
    Payment:
      oneOf:
        - $ref: '#/components/schemas/CardPayment'
        - $ref: '#/components/schemas/BankPayment'
      discriminator:
        propertyName: type
        mapping:
          card: '#/components/schemas/CardPayment'
          bank: '#/components/schemas/BankPayment'
    NewPayment:
      anyOf:
        - type: object
          required: [amount]
          properties:
            amount:
              type: number
        - $ref: './shared.yaml#/components/schemas/AlternativePayment'
    PaymentList:
      type: array
      items:
        $ref: '#/components/schemas/Payment'
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/token
          scopes:
            payments:read: Read payments
